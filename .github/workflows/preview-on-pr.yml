name: Typst Preview
 
on:
  pull_request:
    branches: [main]
    paths:
      - "**.typ"
      - "**.bib"
      - "assets/**"
 
# Minimal permissions at workflow level; job overrides to what's actually needed.
permissions: {}
 
jobs:
  preview:
    runs-on: ubuntu-latest
 
    permissions:
      contents: read        # checkout
      pull-requests: write  # post PR comment
 
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          lfs: true
 
      - name: Install Typst
        uses: typst-community/setup-typst@v4
 
      - name: Compile to PDF
        run: typst compile --font-path=guide/resources/fonts guide/main.typ pr-output.pdf
 
      - name: Upload compiled PDF
        id: upload-pdf
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: pr-output.pdf
          retention-days: 7
 
      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- typst-preview -->"
 
      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- typst-preview -->
            ## 📄 Typst Preview
 
            ✅ Document compiled successfully.
 
            📥 [Download compiled PDF](${{ steps.upload-pdf.outputs.artifact-url }})
 
            > Compiled from ${{ github.event.pull_request.head.sha }} - Compilation artifact available for up to 7 days.
